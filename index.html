<!DOCTYPE html>
<html>
<head>
    <title>SecCheck</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui; padding: 20px; max-width: 600px; margin: auto; }
        input, button { padding: 10px; width: 100%; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #111; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SecCheck</h1>
    <p>Enter a domain to scan ports, headers, SSL</p>
    <form action="/check" method="post">
        <input type="text" name="domain" placeholder="example.com" required>
        <button type="submit">Scan</button>
    </form>
</body>
</html>
